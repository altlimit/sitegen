name: Release

on:
  push:
    branches:
      - "master"
    paths-ignore:
      - "*.md"
      - "site/**"
      - ".agents/**"

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  release:
    name: Release
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Run tests
        run: go test ./...

      - name: Set version
        id: version
        run: echo "VERSION=1.0.${{ github.run_number }}" >> $GITHUB_OUTPUT

      - name: Build all platforms
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          LDFLAGS="-s -w -X main.version=${VERSION}"
          mkdir -p dist

          # Linux amd64
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags "$LDFLAGS" -o dist/sitegen_linux_amd64 .
          # Linux arm64
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -ldflags "$LDFLAGS" -o dist/sitegen_linux_arm64 .
          # macOS amd64
          CGO_ENABLED=0 GOOS=darwin GOARCH=amd64 go build -ldflags "$LDFLAGS" -o dist/sitegen_darwin_amd64 .
          # macOS arm64
          CGO_ENABLED=0 GOOS=darwin GOARCH=arm64 go build -ldflags "$LDFLAGS" -o dist/sitegen_darwin_arm64 .
          # Windows amd64
          CGO_ENABLED=0 GOOS=windows GOARCH=amd64 go build -ldflags "$LDFLAGS" -o dist/sitegen_windows_amd64.exe .

      - name: Generate checksums
        working-directory: dist
        run: sha256sum * > checksums.txt

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.VERSION }}
          name: v${{ steps.version.outputs.VERSION }}
          generate_release_notes: true
          files: |
            dist/sitegen_linux_amd64
            dist/sitegen_linux_arm64
            dist/sitegen_darwin_amd64
            dist/sitegen_darwin_arm64
            dist/sitegen_windows_amd64.exe
            dist/checksums.txt

      - name: Build site
        run: |
          go build
          ./sitegen -clean -minify -base /sitegen
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "./public/sitegen"
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4